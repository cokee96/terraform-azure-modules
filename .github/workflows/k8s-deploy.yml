name: Kubernetes Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, pre, prod]
      image_tag:
        description: "Image tag to deploy (default: git SHA)"
        required: false
        type: string

concurrency:
  group: k8s-deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  REGISTRY:      ${{ vars.ACR_LOGIN_SERVER }}
  IMAGE_NAME:    ${{ vars.APP_NAME }}
  APP_NAME:      ${{ vars.APP_NAME }}
  AKS_NAME:      ${{ vars.AKS_NAME }}
  AKS_RG:        ${{ vars.AKS_RESOURCE_GROUP }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build and push Docker image to ACR
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: "Build & Push → ${{ github.event.inputs.environment }}"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.set_tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: set_tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "${{ env.REGISTRY }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.set_tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to:   type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Avoid ever-growing cache
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Deploy to AKS
  # Uses a GitHub Environment for the approval gate:
  #   Settings → Environments → dev/pre/prod → Required reviewers
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy → ${{ github.event.inputs.environment }}"
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    permissions:
      id-token: write
      contents: read

    env:
      IMAGE_TAG:    ${{ needs.build.outputs.image_tag }}
      NAMESPACE:    ${{ vars.APP_NAME }}-${{ github.event.inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --name "${{ env.AKS_NAME }}" \
            --resource-group "${{ env.AKS_RG }}" \
            --overwrite-existing

      - name: Set image on Deployment
        id: rollout
        run: |
          kubectl set image deployment/"${{ env.APP_NAME }}" \
            "${{ env.APP_NAME }}"="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            -n "${{ env.NAMESPACE }}"

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/"${{ env.APP_NAME }}" \
            -n "${{ env.NAMESPACE }}" \
            --timeout=5m

      - name: Show pod status
        run: |
          echo "=== Pods in ${{ env.NAMESPACE }} ==="
          kubectl get pods -n "${{ env.NAMESPACE }}" -o wide

          echo ""
          echo "=== Recent events ==="
          kubectl get events -n "${{ env.NAMESPACE }}" \
            --sort-by='.lastTimestamp' \
            --field-selector type=Warning \
            | tail -20 || true

      - name: Rollback on failure
        if: failure() && steps.rollout.outcome == 'success'
        run: |
          echo "Deployment failed — rolling back..."
          kubectl rollout undo deployment/"${{ env.APP_NAME }}" \
            -n "${{ env.NAMESPACE }}"

          kubectl rollout status deployment/"${{ env.APP_NAME }}" \
            -n "${{ env.NAMESPACE }}" \
            --timeout=3m

          echo "Rollback completed. Current pods:"
          kubectl get pods -n "${{ env.NAMESPACE }}" -o wide
